<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon-16.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Checklist">
<meta name="theme-color" content="#1c1c1a">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.1);
    --border-strong: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-muted: #6b6a65;
    --text-faint: #a09f9a;
    --check-active: #1D9E75;
    --add-hover: #f0f0ec;
    --section-label: #b0afa9;
    --radius: 8px;
    --shadow: 0 1px 3px rgba(0,0,0,0.07);
    --drop-line: #1D9E75;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a;
      --surface: #252523;
      --border: rgba(255,255,255,0.09);
      --border-strong: rgba(255,255,255,0.16);
      --text: #e8e7e2;
      --text-muted: #9e9d97;
      --text-faint: #6a6965;
      --add-hover: #2e2e2b;
      --section-label: #5a5a55;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 48px 20px 48px;
    user-select: none;
  }

  /* ── Tab bar ── */
  .tab-bar-outer {
    max-width: 720px; margin: 0 auto 12px;
    display: flex; align-items: center; gap: 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .tab-bar-outer::-webkit-scrollbar { display: none; }

  .tab-item {
    display: flex; align-items: center; gap: 5px;
    padding: 6px 11px; border-radius: 6px;
    cursor: pointer; font-size: 12.5px; font-weight: 500;
    color: var(--text-muted); background: transparent;
    border: 0.5px solid transparent; white-space: nowrap; flex-shrink: 0;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    user-select: none;
  }
  .tab-item:hover { background: var(--add-hover); color: var(--text); }
  .tab-item.active {
    background: var(--surface); color: var(--text);
    border-color: var(--border); box-shadow: var(--shadow);
  }

  .tab-name-editable {
    outline: none; border: none; background: transparent;
    font-size: 12.5px; font-weight: 500; color: inherit;
    cursor: pointer; min-width: 30px; max-width: 160px;
    white-space: nowrap; user-select: none;
  }
  .tab-item.active .tab-name-editable { cursor: text; user-select: text; }

  .tab-close {
    width: 14px; height: 14px; border: none; background: transparent;
    cursor: pointer; border-radius: 3px; display: flex; align-items: center;
    justify-content: center; color: var(--text-faint); font-size: 9px;
    padding: 0; flex-shrink: 0; opacity: 0;
    transition: opacity 0.15s, background 0.12s, color 0.12s;
  }
  .tab-item:hover .tab-close, .tab-item.active .tab-close { opacity: 0.65; }
  .tab-close:hover { background: var(--border); color: #c04040; opacity: 1 !important; }

  .tab-share {
    width: 14px; height: 14px; border: none; background: transparent;
    cursor: pointer; border-radius: 3px; display: flex; align-items: center;
    justify-content: center; color: var(--text-faint); font-size: 10px;
    padding: 0; flex-shrink: 0; opacity: 0;
    transition: opacity 0.15s, background 0.12s, color 0.12s;
  }
  .tab-item.active .tab-share { opacity: 0.55; }
  .tab-share:hover { background: var(--border); color: var(--check-active); opacity: 1 !important; }

  .tab-add-btn {
    width: 28px; height: 28px; border: none; background: transparent;
    cursor: pointer; border-radius: 6px; display: flex; align-items: center;
    justify-content: center; color: var(--text-faint); font-size: 18px;
    padding: 0; flex-shrink: 0; margin-left: 2px;
    transition: background 0.12s, color 0.12s;
  }
  .tab-add-btn:hover { background: var(--add-hover); color: var(--text-muted); }

  .page-header { max-width: 720px; margin: 0 auto 40px; }

  .page-title {
    font-size: 26px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 6px;
    outline: none; background: transparent; cursor: text; user-select: text;
    border-radius: 4px; display: block;
  }
  .page-title:focus { background: rgba(100,100,80,0.06); padding: 1px 6px; margin: 0 -6px 5px; }

  .page-subtitle { font-size: 13px; color: var(--text-muted); }

  .progress-row { display: flex; align-items: center; gap: 12px; margin-top: 18px; }

  .progress-bar { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }

  .progress-fill { height: 100%; background: var(--check-active); border-radius: 2px; transition: width 0.3s ease; }

  .progress-label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

  .autosave-dot {
    position: fixed; top: 16px; right: 20px;
    font-size: 12px; color: var(--text-faint);
    pointer-events: none; transition: opacity 0.4s;
  }
  .autosave-dot.saving { color: #e08040; opacity: 1; }
  .autosave-dot.saved  { color: var(--check-active); opacity: 1; }
  .autosave-dot.idle   { opacity: 0; }

  .container { max-width: 720px; margin: 0 auto; }

  .team-block {
    margin-bottom: 40px;
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: 12px;
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .team-header {
    display: flex; align-items: center; gap: 12px;
    padding: 18px 20px 16px;
    border-bottom: 0.5px solid var(--border);
  }

  .team-color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  .team-name-editable {
    font-size: 20px; font-weight: 700; letter-spacing: -0.3px;
    color: var(--text); outline: none; border: none; background: transparent;
    flex: 1; min-width: 0; cursor: text; user-select: text;
  }

  .team-name-editable:focus {
    background: rgba(100,100,80,0.06); border-radius: 4px; padding: 0 6px; margin: 0 -6px;
  }

  .btn-icon {
    width: 24px; height: 24px; border: none; background: transparent;
    cursor: pointer; border-radius: 4px; display: flex; align-items: center;
    justify-content: center; color: var(--text-faint); font-size: 14px;
    transition: opacity 0.15s, background 0.12s, color 0.12s;
    padding: 0; flex-shrink: 0; opacity: 0;
  }

  .team-header:hover .btn-icon,
  .task:hover .btn-icon,
  .section-header-row:hover .btn-icon { opacity: 1; }

  .btn-icon:hover { background: var(--border); color: var(--text-muted); }
  .btn-icon.delete:hover { color: #c04040; background: #fdf0f0; }

  .team-body { padding: 8px 20px 16px; }

  .section-block { margin-top: 20px; }
  .section-block:first-child { margin-top: 12px; }

  .section-header-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; }

  .section-name-editable {
    font-size: 10px; font-weight: 700; color: var(--section-label);
    text-transform: uppercase; letter-spacing: 0.1em;
    outline: none; border: none; background: transparent;
    cursor: text; flex: 1; user-select: text;
  }

  .section-name-editable:focus {
    background: rgba(100,100,80,0.06); border-radius: 3px; padding: 1px 4px; margin: 0 -4px;
  }

  .task-list { display: flex; flex-direction: column; gap: 5px; }

  /* drop indicator line */
  .drop-indicator {
    height: 2px;
    background: var(--drop-line);
    border-radius: 2px;
    margin: 0 2px;
    pointer-events: none;
    display: none;
  }
  .drop-indicator.visible { display: block; }

  .task {
    display: flex; align-items: flex-start; gap: 8px;
    padding: 9px 10px 9px 6px;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    transition: background 0.12s, opacity 0.15s, box-shadow 0.15s;
    position: relative;
    cursor: default;
  }

  .task:hover { background: var(--add-hover); }
  .task.dragging { opacity: 0.4; box-shadow: none; }
  .task.drag-over { background: var(--add-hover); }

  /* drag handle */
  .drag-handle {
    width: 16px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: grab; color: var(--text-faint);
    font-size: 14px; opacity: 0;
    transition: opacity 0.15s;
    margin-top: 2px; align-self: flex-start;
    line-height: 1;
    letter-spacing: -1px;
  }

  .task:hover .drag-handle { opacity: 1; }
  .drag-handle:active { cursor: grabbing; }

  .checkbox {
    width: 17px; height: 17px; border-radius: 4px;
    border: 1.5px solid var(--border-strong); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; margin-top: 2px;
    transition: all 0.15s; background: transparent;
  }

  .checkbox.checked { background: var(--check-active); border-color: var(--check-active); }
  .checkbox svg { display: none; }
  .checkbox.checked svg { display: block; }

  .task-body { flex: 1; min-width: 0; }

  .task-text {
    font-size: 13.5px; color: var(--text); line-height: 1.55;
    outline: none; border: none; background: transparent;
    width: 100%; cursor: text; transition: color 0.15s;
    white-space: pre-wrap; word-break: break-word; user-select: text;
  }

  .task-text:focus {
    background: rgba(100,100,80,0.06); border-radius: 4px; padding: 0 4px; margin: 0 -4px;
  }

  .task.done .task-text { color: var(--text-faint); text-decoration: line-through; }

  .task-actions { display: flex; gap: 4px; flex-shrink: 0; }

  .add-task-row {
    display: flex; align-items: center; gap: 8px; padding: 7px 10px;
    border: 0.5px dashed var(--border-strong); border-radius: var(--radius);
    cursor: pointer; color: var(--text-faint); font-size: 12px; margin-top: 5px;
    transition: background 0.12s, color 0.12s;
  }
  .add-task-row:hover { background: var(--add-hover); color: var(--text-muted); }

  .add-section-row {
    display: flex; align-items: center; gap: 5px; margin-top: 16px;
    cursor: pointer; color: var(--text-faint); font-size: 10px; font-weight: 700;
    text-transform: uppercase; letter-spacing: 0.09em; width: fit-content;
    padding: 3px 6px; border-radius: 4px; transition: background 0.12s, color 0.12s;
  }
  .add-section-row:hover { background: var(--add-hover); color: var(--text-muted); }

  .add-team-row {
    display: flex; align-items: center; gap: 8px; max-width: 720px; margin: 0 auto 8px;
    padding: 12px 20px; border: 0.5px dashed var(--border-strong); border-radius: 12px;
    cursor: pointer; color: var(--text-faint); font-size: 13px;
    transition: background 0.12s, color 0.12s;
  }
  .add-team-row:hover { background: var(--add-hover); color: var(--text-muted); }
</style>
</head>
<body>

<div class="autosave-dot idle" id="autosave-dot">● Saved</div>

<div class="tab-bar-outer" id="tab-bar"></div>

<div class="page-header">
  <div class="page-title" id="page-title" contenteditable="true" spellcheck="false">Phase 1 Reactivation — Team Checklist</div>
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <span class="progress-label" id="prog-label">0 / 0 done</span>
  </div>
</div>

<div class="container" id="teams-container"></div>
<div class="add-team-row" onclick="addTeam()">
  <span style="font-size:16px;line-height:1">+</span> Add team
</div>

<script>
// ── Sync configuration ────────────────────────────────────────────────────────
const WORKER_URL = 'https://checklist-sync.rshashank.workers.dev/'; // e.g. https://checklist-sync.yourname.workers.dev
const WRITE_KEY  = 'arre-checklist-2026';
// ─────────────────────────────────────────────────────────────────────────────

const DEFAULT_DATA = {
  teams: [
    {
      id: 't1', name: 'Engineering team', color: '#1a5fa8',
      sections: [
        {
          id: 's1', name: 'Infrastructure & tracking',
          tasks: [
            { id: 'e1', text: 'Resolve email-capture question (needed before classifier finalisation)', done: false },
            { id: 'e2', text: 'Set up OneLink + AppsFlyer attribution \u2014 test end-to-end on 4 devices', done: false },
            { id: 'e3', text: 'Instrument swipe-feed events in production (needed for funnel measurement)', done: false },
            { id: 'e4', text: 'Configure Gupshup button_click webhook for WhatsApp interactive messages', done: false },
            { id: 'e5', text: "Set up FCM in-app push for \u2018installed, didn\u2019t open\u2019 responder branch", done: false },
          ]
        },
        {
          id: 's2', name: 'CRM & suppression',
          tasks: [
            { id: 'e6', text: 'Build STOP cross-channel suppression logic (must suppress immediately on any channel)', done: false },
            { id: 'e7', text: 'Build responder branching logic (clicked no install, installed no open, played no return) in CleverTap', done: false },
            { id: 'e8', text: 'CleverTap \u2194 BigQuery pipeline live and QA\u2019d', done: false },
            { id: 'e9', text: 'Sync cohort segments to CleverTap; QA 100 records per tier', done: false },
          ]
        },
        {
          id: 's3', name: 'Go / no-go gate',
          tasks: [
            { id: 'e10', text: '4-device install test green + Looker dashboards green before launch authorisation', done: false },
          ]
        }
      ]
    },
    {
      id: 't2', name: 'Data (you)', color: '#0d6e4f',
      sections: [
        {
          id: 's4', name: 'Already done',
          tasks: [
            { id: 'd1', text: 'Cohort contact sheets (Tier 1\u20134 Excel files with Users with Contact Info)', done: true },
          ]
        },
        {
          id: 's5', name: 'Still needed',
          tasks: [
            { id: 'd2', text: 'Finalise and confirm keyword classifier (classify.py) \u2014 anchor dict + stoplist locked', done: false },
            { id: 'd3', text: 'Run classifier \u2192 output T1_classified.csv, T2_classified.csv, T3_classified.csv to /outputs/taxonomy/', done: false },
            { id: 'd4', text: 'Extract cohort tables to BigQuery (phase1_cohorts.*)', done: false },
            { id: 'd5', text: 'Generate personalisation tokens \u2014 T1 weekly plays counter, T2 top creator name', done: false },
            { id: 'd6', text: 'Build 6 Looker dashboards for funnel measurement and QA', done: false },
            { id: 'd7', text: 'Sign off cohort definitions before creative kickoff', done: false },
            { id: 'd8', text: 'Review T3 Tamil bias \u2014 decide whether to force-balance Hindi or let Tamil-heavy data run as-is in Phase 1', done: false },
            { id: 'd9', text: 'Flag Pop Culture / Cricket volume (T1: 87, T2: 31, T3: 203) \u2014 decide if cricket needs its own sub-category', done: false },
          ]
        }
      ]
    },
    {
      id: 't3', name: 'Community manager (+ creatives)', color: '#855010',
      sections: [
        {
          id: 's6', name: 'WhatsApp templates \u2014 file with Meta',
          tasks: [
            { id: 'c1', text: 'File Meta Marketing template (M1 topic video send) \u2014 Hindi + Tamil versions', done: false },
            { id: 'c2', text: 'File Meta Utility backup template (fallback if Marketing template delivery fails)', done: false },
            { id: 'c3', text: 'File Meta Interactive feedback template \u2014 4-button list (Content / Creators / App / Other) \u2014 1 per language', done: false },
          ]
        },
        {
          id: 's7', name: 'Video assets (22 total)',
          tasks: [
            { id: 'c4', text: '20 topic videos \u2014 10 topics \u00d7 2 languages (Hindi + Tamil), 15s each, language-matched VO', done: false },
            { id: 'c5', text: '2 UX-fallback videos \u2014 1 per language (swipe-feed hook, no topic reference)', done: false },
            { id: 'c6', text: 'Add T1 dynamic plays-counter overlay on all T1 topic videos (on-screen text + VO slot)', done: false },
            { id: 'c7', text: 'Add tier framing overlay (on-screen text + VO variable slot) \u2014 T1 = Creator framing, T2/T3 = Listener framing', done: false },
          ]
        },
        {
          id: 's8', name: 'Landing pages',
          tasks: [
            { id: 'c8', text: '22 landing pages \u2014 1 per topic \u00d7 language pair (template-generated; adjacent thumbnails shown)', done: false },
          ]
        },
        {
          id: 's9', name: 'Priority cohort to flag',
          tasks: [
            { id: 'c9', text: 'Tamil Quiz/GK WhatsApp variant \u2014 93 users in 90th band (45% top-heavy); brief CM to create dedicated variant', done: false },
          ]
        }
      ]
    }
  ]
};

/* ── state ── */
let state = null;
let uid = 0;
let saveTimer = null;
let pendingUserChanges = false;
const newId = () => 'x' + (++uid) + '_' + Date.now();

/* ── migrate old { teams:[...] } format → { tabs:[...], activeTabId } ── */
function migrateState(raw) {
  if (!raw) return raw;
  if (raw.teams && !raw.tabs) {
    return {
      tabs: [{
        id: 'tab1',
        name: 'Phase 1',
        title: 'Phase 1 Reactivation — Team Checklist',
        teams: raw.teams
      }],
      activeTabId: 'tab1'
    };
  }
  return raw;
}

function activeTab() {
  if (!state || !state.tabs) return null;
  return state.tabs.find(t => t.id === state.activeTabId) || state.tabs[0];
}

// ── Sync API helpers (via Cloudflare Worker) ──────────────────────────────────
async function readGist() {
  const res = await fetch(WORKER_URL);
  if (!res.ok) throw new Error('Read failed: ' + res.status);
  return await res.json();
}

async function writeGist(data) {
  const res = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'X-Write-Key': WRITE_KEY },
    body: JSON.stringify(data),
  });
  if (!res.ok) throw new Error('Write failed: ' + res.status);
}

// ── Load state ────────────────────────────────────────────────────────────────
async function loadState() {
  // Step 1: paint from localStorage cache immediately
  // Try v2 first, then fall back to v1 (legacy key) if v2 is empty
  let hadCache = false;
  try {
    const r2 = localStorage.getItem('phase1_checklist_v2');
    const r1 = localStorage.getItem('phase1_checklist_v1');
    const r = r2 || r1; // prefer v2, fall back to v1
    if (r) {
      state = migrateState(JSON.parse(r));
      // Migrate v1 data up to v2 key immediately
      if (!r2 && r1) {
        try { localStorage.setItem('phase1_checklist_v2', r1); } catch(_) {}
      }
      hadCache = true;
    }
  } catch(_) {}

  if (hadCache) {
    render(); updateProgress();
    const d = document.getElementById('autosave-dot');
    d.className = 'autosave-dot saving'; d.textContent = '● Syncing…';
  } else {
    showDot('saving');
    document.getElementById('autosave-dot').textContent = '● Loading…';
  }

  // Step 2: fetch from Gist
  try {
    const raw = await readGist();
    const hasValidData = raw && (raw.tabs || raw.teams);

    if (!hasValidData) {
      // Gist is empty — first sync: push our local/default data up to it
      if (!state) {
        state = migrateState(JSON.parse(JSON.stringify(DEFAULT_DATA)));
        render(); updateProgress();
      }
      await writeGist(state);
      try { localStorage.setItem('phase1_checklist_v2', JSON.stringify(state)); } catch(_) {}
    } else if (!pendingUserChanges) {
      state = migrateState(raw);
      // Apply URL hash — linked tab may only exist in Gist, not local cache
      const hashTabId = window.location.hash.slice(1);
      if (hashTabId && state.tabs.find(t => t.id === hashTabId)) {
        state.activeTabId = hashTabId;
      }
      try { localStorage.setItem('phase1_checklist_v2', JSON.stringify(state)); } catch(_) {}
      render(); updateProgress();
    }

    showDot('saved'); setTimeout(() => showDot('idle'), 1800);
  } catch(e) {
    console.error('Gist load error:', e);
    if (!state) {
      try {
        const r2 = localStorage.getItem('phase1_checklist_v2');
        const r1 = localStorage.getItem('phase1_checklist_v1');
        const r = r2 || r1;
        if (r) { state = migrateState(JSON.parse(r)); }
      } catch(_) {}
      if (!state) state = migrateState(JSON.parse(JSON.stringify(DEFAULT_DATA)));
      render(); updateProgress();
    }
    showDot('idle');
  }
}

// ── Auto-save (async, debounced) ─────────────────────────────────────────────
function autoSave() {
  clearTimeout(saveTimer);
  showDot('saving');
  saveTimer = setTimeout(async () => {
    try {
      await writeGist(state);
      try { localStorage.setItem('phase1_checklist_v2', JSON.stringify(state)); } catch(_) {}
      pendingUserChanges = false;
      showDot('saved');
      setTimeout(() => showDot('idle'), 1800);
    } catch(e) {
      console.error('Gist save error:', e);
      showDot('idle');
    }
  }, 800);
}

function showDot(s) {
  const d = document.getElementById('autosave-dot');
  d.className = 'autosave-dot ' + s;
  d.textContent = s === 'saving' ? '● Saving\u2026' : '● Saved';
}

function markDirty() {
  pendingUserChanges = true;
  // Write to localStorage immediately so cache is always up-to-date
  try { localStorage.setItem('phase1_checklist_v2', JSON.stringify(state)); } catch(_) {}
  autoSave();
}

function updateProgress() {
  const tab = activeTab();
  let total = 0, done = 0;
  if (tab) tab.teams.forEach(t => t.sections.forEach(s => s.tasks.forEach(tk => { total++; if(tk.done) done++; })));
  const pct = total ? Math.round(done/total*100) : 0;
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent = done + ' / ' + total + ' done';
}

/* ── drag state ── */
let drag = {
  taskId: null, fromTeamId: null, fromSectionId: null,
  overTaskId: null, overSectionId: null, overTeamId: null, position: null
};

function findTask(taskId) {
  const tab = activeTab();
  if (!tab) return null;
  for (const team of tab.teams)
    for (const sec of team.sections)
      for (const tk of sec.tasks)
        if (tk.id === taskId) return { team, sec, tk };
  return null;
}

function applyDrop() {
  if (!drag.taskId || !drag.overSectionId) return;
  const src = findTask(drag.taskId);
  if (!src) return;

  const tab = activeTab();
  const destTeam = tab && tab.teams.find(t => t.id === drag.overTeamId);
  const destSec = destTeam && destTeam.sections.find(s => s.id === drag.overSectionId);
  if (!destSec) return;

  // remove from source
  src.sec.tasks = src.sec.tasks.filter(t => t.id !== drag.taskId);

  // insert into dest
  if (drag.overTaskId) {
    const idx = destSec.tasks.findIndex(t => t.id === drag.overTaskId);
    if (idx === -1) {
      destSec.tasks.push(src.tk);
    } else {
      const insertAt = drag.position === 'before' ? idx : idx + 1;
      destSec.tasks.splice(insertAt, 0, src.tk);
    }
  } else {
    destSec.tasks.push(src.tk);
  }

  markDirty();
  render();
  updateProgress();
}

/* ── render ── */
function render() {
  renderTabs();

  const tab = activeTab();

  // Update editable page title
  const titleEl = document.getElementById('page-title');
  if (tab && document.activeElement !== titleEl) {
    titleEl.textContent = tab.title || tab.name;
  }

  const container = document.getElementById('teams-container');
  container.innerHTML = '';
  if (!tab) { updateProgress(); return; }

  tab.teams.forEach(team => {
    const block = document.createElement('div');
    block.className = 'team-block';

    const header = document.createElement('div');
    header.className = 'team-header';

    const dot = document.createElement('div');
    dot.className = 'team-color-dot';
    dot.style.background = team.color || '#888';

    const nameEl = document.createElement('div');
    nameEl.className = 'team-name-editable';
    nameEl.contentEditable = 'true';
    nameEl.spellcheck = false;
    nameEl.textContent = team.name;
    nameEl.addEventListener('input', () => { team.name = nameEl.textContent; markDirty(); });
    nameEl.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); } });

    const delTeamBtn = document.createElement('button');
    delTeamBtn.className = 'btn-icon delete';
    delTeamBtn.innerHTML = '✕';
    delTeamBtn.title = 'Remove team';
    delTeamBtn.addEventListener('click', () => {
      if(confirm('Remove this entire team?')) {
        const tab = activeTab();
        tab.teams = tab.teams.filter(t => t.id !== team.id);
        markDirty(); render(); updateProgress();
      }
    });

    header.appendChild(dot); header.appendChild(nameEl); header.appendChild(delTeamBtn);
    block.appendChild(header);

    const body = document.createElement('div');
    body.className = 'team-body';

    team.sections.forEach(section => {
      const secBlock = document.createElement('div');
      secBlock.className = 'section-block';

      const secRow = document.createElement('div');
      secRow.className = 'section-header-row';

      const secName = document.createElement('span');
      secName.className = 'section-name-editable';
      secName.contentEditable = 'true';
      secName.spellcheck = false;
      secName.textContent = section.name;
      secName.addEventListener('input', () => { section.name = secName.textContent; markDirty(); });
      secName.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); secName.blur(); } });

      const secDel = document.createElement('button');
      secDel.className = 'btn-icon delete';
      secDel.innerHTML = '✕';
      secDel.title = 'Remove section';
      secDel.addEventListener('click', () => {
        if(confirm('Remove this section and all its tasks?')) {
          team.sections = team.sections.filter(s => s.id !== section.id);
          markDirty(); render(); updateProgress();
        }
      });

      secRow.appendChild(secName); secRow.appendChild(secDel);
      secBlock.appendChild(secRow);

      const taskList = document.createElement('div');
      taskList.className = 'task-list';
      taskList.dataset.sectionId = section.id;
      taskList.dataset.teamId = team.id;

      /* drop zone on the list itself (empty section) */
      taskList.addEventListener('dragover', e => {
        e.preventDefault();
        e.dataTransfer.dropEffect = 'move';
        if (section.tasks.length === 0) {
          drag.overSectionId = section.id;
          drag.overTeamId = team.id;
          drag.overTaskId = null;
          drag.position = null;
        }
      });

      section.tasks.forEach(task => {
        /* drop indicator before each task */
        const indBefore = document.createElement('div');
        indBefore.className = 'drop-indicator';
        indBefore.dataset.taskId = task.id;
        indBefore.dataset.pos = 'before';
        taskList.appendChild(indBefore);

        const row = document.createElement('div');
        row.className = 'task' + (task.done ? ' done' : '');
        row.dataset.taskId = task.id;
        row.draggable = true;

        /* drag events on the row */
        row.addEventListener('dragstart', e => {
          drag.taskId = task.id;
          drag.fromTeamId = team.id;
          drag.fromSectionId = section.id;
          e.dataTransfer.effectAllowed = 'move';
          e.dataTransfer.setData('text/plain', task.id);
          setTimeout(() => row.classList.add('dragging'), 0);
        });

        row.addEventListener('dragend', () => {
          row.classList.remove('dragging');
          clearAllIndicators();
          drag = { taskId:null, fromTeamId:null, fromSectionId:null, overTaskId:null, overSectionId:null, overTeamId:null, position:null };
        });

        row.addEventListener('dragover', e => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
          const rect = row.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          const pos = e.clientY < mid ? 'before' : 'after';
          drag.overTaskId = task.id;
          drag.overSectionId = section.id;
          drag.overTeamId = team.id;
          drag.position = pos;
          clearAllIndicators();
          const ind = taskList.querySelector(`.drop-indicator[data-task-id="${task.id}"][data-pos="${pos}"]`);
          if (ind) ind.classList.add('visible');
        });

        row.addEventListener('drop', e => {
          e.preventDefault();
          clearAllIndicators();
          applyDrop();
        });

        /* handle */
        const handle = document.createElement('div');
        handle.className = 'drag-handle';
        handle.innerHTML = '&#8942;&#8942;';
        handle.title = '';

        const cb = document.createElement('div');
        cb.className = 'checkbox' + (task.done ? ' checked' : '');
        cb.innerHTML = '<svg width="10" height="8" viewBox="0 0 10 8" fill="none"><polyline points="1,4 4,7 9,1" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>';
        cb.addEventListener('click', () => {
          task.done = !task.done;
          row.classList.toggle('done', task.done);
          cb.classList.toggle('checked', task.done);
          markDirty(); updateProgress();
        });

        const taskBody = document.createElement('div');
        taskBody.className = 'task-body';

        const txt = document.createElement('div');
        txt.className = 'task-text';
        txt.contentEditable = 'true';
        txt.spellcheck = false;
        txt.textContent = task.text;
        txt.addEventListener('input', () => { task.text = txt.textContent; markDirty(); });
        txt.addEventListener('keydown', e => { if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); txt.blur(); } });

        taskBody.appendChild(txt);

        const actions = document.createElement('div');
        actions.className = 'task-actions';

        const delBtn = document.createElement('button');
        delBtn.className = 'btn-icon delete';
        delBtn.innerHTML = '✕';
        delBtn.title = 'Delete task';
        delBtn.addEventListener('click', () => {
          section.tasks = section.tasks.filter(tk => tk.id !== task.id);
          markDirty(); render(); updateProgress();
        });

        actions.appendChild(delBtn);
        row.appendChild(handle);
        row.appendChild(cb);
        row.appendChild(taskBody);
        row.appendChild(actions);
        taskList.appendChild(row);

        /* drop indicator after task */
        const indAfter = document.createElement('div');
        indAfter.className = 'drop-indicator';
        indAfter.dataset.taskId = task.id;
        indAfter.dataset.pos = 'after';
        taskList.appendChild(indAfter);
      });

      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      addRow.innerHTML = '<span style="font-size:14px;line-height:1">+</span> Add task';
      addRow.addEventListener('click', () => {
        const newTask = { id: newId(), text: 'New task', done: false };
        section.tasks.push(newTask);
        markDirty(); render(); updateProgress();
        setTimeout(() => {
          const newText = document.querySelector(`.task[data-task-id="${newTask.id}"] .task-text`);
          if (newText) { newText.focus(); document.execCommand('selectAll'); }
        }, 50);
      });

      taskList.appendChild(addRow);
      secBlock.appendChild(taskList);
      body.appendChild(secBlock);
    });

    const addSecRow = document.createElement('div');
    addSecRow.className = 'add-section-row';
    addSecRow.innerHTML = '+ Add section';
    addSecRow.addEventListener('click', () => {
      team.sections.push({ id: newId(), name: 'New section', tasks: [] });
      markDirty(); render();
    });
    body.appendChild(addSecRow);

    block.appendChild(body);
    container.appendChild(block);
  });

  updateProgress();
}

function clearAllIndicators() {
  document.querySelectorAll('.drop-indicator.visible').forEach(el => el.classList.remove('visible'));
}

function addTeam() {
  const tab = activeTab();
  if (!tab) return;
  const palette = ['#1a5fa8','#0d6e4f','#855010','#6b3fa0','#a03030'];
  const used = tab.teams.map(t => t.color);
  const color = palette.find(c => !used.includes(c)) || palette[0];
  tab.teams.push({
    id: newId(), name: 'New team', color,
    sections: [{ id: newId(), name: 'Tasks', tasks: [{ id: newId(), text: 'First task', done: false }] }]
  });
  markDirty(); render(); updateProgress();
}

// ── Tab management ────────────────────────────────────────────────────────────
function renderTabs() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';

  state.tabs.forEach(tab => {
    const item = document.createElement('div');
    item.className = 'tab-item' + (tab.id === state.activeTabId ? ' active' : '');

    const nameEl = document.createElement('div');
    nameEl.className = 'tab-name-editable';
    // Only make the name editable on the active tab
    nameEl.contentEditable = (tab.id === state.activeTabId) ? 'true' : 'false';
    nameEl.spellcheck = false;
    nameEl.textContent = tab.name;
    nameEl.addEventListener('input', () => { tab.name = nameEl.textContent; markDirty(); });
    nameEl.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); nameEl.blur(); } });

    // Click on the tab-item (anywhere except the close button) switches to that tab
    item.addEventListener('click', () => {
      if (tab.id !== state.activeTabId) switchTab(tab.id);
    });

    const closeBtn = document.createElement('button');
    closeBtn.className = 'tab-close';
    closeBtn.innerHTML = '✕';
    closeBtn.title = 'Delete checklist';
    closeBtn.addEventListener('click', e => {
      e.stopPropagation();
      if (state.tabs.length === 1) { alert("Can't delete the only checklist."); return; }
      if (confirm(`Delete "${tab.name}" checklist and all its data?`)) {
        const idx = state.tabs.findIndex(t => t.id === tab.id);
        state.tabs = state.tabs.filter(t => t.id !== tab.id);
        if (state.activeTabId === tab.id) {
          state.activeTabId = state.tabs[Math.max(0, idx - 1)].id;
        }
        markDirty(); render(); updateProgress();
      }
    });

    const shareBtn = document.createElement('button');
    shareBtn.className = 'tab-share';
    shareBtn.innerHTML = '⎘';
    shareBtn.title = 'Copy link to this tab';
    shareBtn.addEventListener('click', e => {
      e.stopPropagation();
      const url = location.href.split('#')[0] + '#' + tab.id;
      navigator.clipboard.writeText(url).then(() => {
        shareBtn.textContent = '✓';
        setTimeout(() => { shareBtn.textContent = '⎘'; }, 1800);
      });
    });

    item.appendChild(nameEl);
    item.appendChild(shareBtn);
    item.appendChild(closeBtn);
    bar.appendChild(item);
  });

  const addBtn = document.createElement('button');
  addBtn.className = 'tab-add-btn';
  addBtn.innerHTML = '+';
  addBtn.title = 'New checklist';
  addBtn.addEventListener('click', addTab);
  bar.appendChild(addBtn);
}

function switchTab(tabId) {
  state.activeTabId = tabId;
  history.replaceState(null, '', '#' + tabId);
  markDirty();
  render();
  updateProgress();
}

function addTab() {
  const newTab = {
    id: newId(),
    name: 'New checklist',
    title: 'New Checklist',
    teams: []
  };
  state.tabs.push(newTab);
  state.activeTabId = newTab.id;
  history.replaceState(null, '', '#' + newTab.id);
  markDirty(); render(); updateProgress();
  // Focus the new tab name for quick rename
  setTimeout(() => {
    const items = document.querySelectorAll('.tab-item.active .tab-name-editable');
    if (items.length) { items[0].focus(); document.execCommand('selectAll'); }
  }, 50);
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  await loadState();

  // If URL has a tab hash, jump to that tab
  const hashTabId = window.location.hash.slice(1);
  if (hashTabId && state.tabs && state.tabs.find(t => t.id === hashTabId)) {
    state.activeTabId = hashTabId;
  }

  // Wire up editable page title → saves to active tab's title field
  const titleEl = document.getElementById('page-title');
  titleEl.addEventListener('input', () => {
    const tab = activeTab();
    if (tab) { tab.title = titleEl.textContent; markDirty(); }
  });
  titleEl.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); titleEl.blur(); } });

  render();
  updateProgress();

  // ── Periodic background sync (every 30s) ─────────────────────────────────
  setInterval(async () => {
    if (pendingUserChanges) return;
    try {
      const raw = await readGist();
      if (pendingUserChanges) return;
      const isValid = raw && (raw.tabs || raw.teams);
      if (!isValid) return;
      const freshJson = JSON.stringify(raw);
      const currentJson = JSON.stringify(state);
      if (freshJson !== currentJson) {
        state = migrateState(raw);
        try { localStorage.setItem('phase1_checklist_v2', JSON.stringify(state)); } catch(_) {}
        render(); updateProgress();
        showDot('saved'); setTimeout(() => showDot('idle'), 1800);
      }
    } catch(_) {}
  }, 30000);
  // Register service worker for PWA installability
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  }
})();
</script>
